<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>n.SSign Daily Tasks for COSMO</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            line-height: 1.6;
            color: #333;
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
            background-color: #f9f9f9;
        }
        .card {
            background: #fff;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }
        h2 {
            border-bottom: 2px solid #eee;
            padding-bottom: 10px;
            font-size: 1.25rem;
        }
        .app-name-blue {
            color: #3131FF;
            font-weight: bold;
        }
        .heart-red {
            color: #FF0000;
        }
        ul {
            padding-left: 20px;
        }
        li {
            margin-bottom: 8px;
        }
        .footer-note {
            background-color: #f0f4ff;
            padding: 15px;
            border-radius: 8px;
            font-size: 0.9rem;
        }
        hr {
            border: 0;
            border-top: 1px solid #eee;
            margin: 20px 0;
        }
    </style>
</head>
<body>

    <div class="card">
        <h2>📱 アプリ別有効期限</h2>

        <h3 class="app-name-blue">IDOL CHAMP</h3>
        <ul>
            <li>💙：毎月月末まで</li>
            <li><span class="heart-red">❤</span>：獲得から90日（Ruby投票券にすると12/31まで）</li>
        </ul>

        <h3 class="app-name-blue">Fancast</h3>
        <ul>
            <li>💙：獲得から30日（チェックイン・広告視聴分）</li>
        </ul>
    </div>

    <div class="card footer-note">
        <p><strong>💡 カムバックが確定するまで</strong></p>
        <ul>
            <li>IDOL CHAMPの💙は月末になったらチャートなどへ</li>
            <li>Fancastは有効期限が短いため 自分のペースでルーティンに組み込んでください</li>
        </ul>
    </div>

</body>
</html>
