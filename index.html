<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>投票アイテム収集リスト</title>
<style>
  :root {
    --gold: #FFD700;
    --orange: #FF8C00;
    --red: #D32F2F;
    --app-blue: #3131FF;
    --heart-red: #FF0000;
  }
  body { margin: 0; background: #f0f2f5; font-family: sans-serif; display: flex; justify-content: center; }
  
  .container { 
    background: linear-gradient(135deg, var(--gold), var(--orange)); 
    padding: 15px; border-radius: 24px; width: 90%; max-width: 360px; margin: 15px; 
    text-align: center; box-shadow: 0 8px 20px rgba(0,0,0,0.1);
    transition: all 0.8s ease;
    will-change: transform, background;
    position: relative;
    overflow: hidden;
  }

  .all-completed {
    background: linear-gradient(45deg, #FFD700, #FF8C00, #FF0080, #7928CA);
    background-size: 300% 300%;
    animation: shine 3s linear infinite;
    transform: scale(1.02);
    box-shadow: 0 0 30px rgba(255, 215, 0, 0.6);
  }
  @keyframes shine { 0%{background-position:0% 50%} 50%{background-position:100% 50%} 100%{background-position:0% 50%} }

  #date { font-size: 0.9rem; font-weight: bold; color: #fff; margin-bottom: 5px; display: block; text-shadow: 1px 1px 2px rgba(0,0,0,0.3); }
  
  h2 { font-size: 1.6rem; font-weight: 900; margin: 0 0 10px; color: #fff; text-shadow: 2px 2px 4px rgba(0,0,0,0.4); line-height: 1.3; }
  
  .section-title { font-size: 1rem; font-weight: bold; color: #fff; margin: 15px 0 8px; text-shadow: 1px 1px 2px rgba(0,0,0,0.3); text-align: left; padding-left: 5px; }

  .limit-info { background: rgba(255,255,255,0.4); border-radius: 12px; padding: 10px; margin-bottom: 12px; color: #333; text-align: left; font-size: 0.7rem; line-height: 1.7; font-weight: bold; }
  .limit-row { display: flex; align-items: flex-start; margin-bottom: 4px; }
  .limit-row:last-child { margin-bottom: 0; }
  
  /* 白い箱の横幅を 95px に広げ、IDOL CHAMP が折れないようにしました */
  .limit-info b { color: var(--app-blue); background: #fff; padding: 1px 4px; border-radius: 4px; display: inline-block; font-size: 0.72rem; font-weight: bold; width: 95px; text-align: center; margin-right: 8px; flex-shrink: 0; letter-spacing: -0.02em; }
  .limit-text { font-weight: bold; padding-top: 1px; }
  
  .mu-block { display: inline-block; vertical-align: top; padding-top: 1px; }

  .item { 
    background: #fff; display: flex; align-items: center; padding: 12px 15px; 
    border-radius: 15px; margin-bottom: 8px; box-shadow: 0 3px 6px rgba(0,0,0,0.1);
    transition: 0.3s;
  }
  .item.is-completed { opacity: 0.4; transform: scale(0.95); background: #f8f8f8; }
  
  .item span { font-size: 0.95rem; color: #333; font-weight: bold; flex-grow: 1; text-align: left; line-height: 1.3; display: flex; flex-direction: column; justify-content: center; }
  .app-tag { color: var(--app-blue); font-size: 0.75rem; display: block; margin-bottom: 2px; font-weight: bold; }
  
  .note { font-size: 11px !important; color: #888 !important; font-weight: normal !important; display: block; margin-top: 4px; }
  
  input[type="checkbox"] { width: 26px; height: 26px; margin-right: 12px; accent-color: var(--orange); flex-shrink: 0; }
  
  .footer { margin-top: 10px; padding: 12px; background: rgba(0,0,0,0.15); border-radius: 12px; color: #fff; text-align: left; font-size: 0.8rem; line-height: 1.6; font-weight: bold; text-shadow: 1px 1px 2px rgba(0,0,0,0.3); }
  .footer b { font-size: 0.8rem; display: block; margin-bottom: 4px; }
  .indent { font-size: 0.62rem; padding-left: 1.2em; text-indent: -1.2em; display: block; letter-spacing: -0.01em; opacity: 0.95; }

  .popup-reward {
    position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0);
    font-size: 2.2rem; background: rgba(255, 255, 255, 0.95); padding: 15px 25px;
    border-radius: 50px; box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    z-index: 9999; pointer-events: none; opacity: 0; white-space: nowrap;
  }
  .popup-reward.show { animation: pop-up 1.8s ease-out forwards; }
  @keyframes pop-up {
    0% { transform: translate(-50%, -50%) scale(0.3); opacity: 0; }
    15% { transform: translate(-50%, -50%) scale(1.1); opacity: 1; }
    25% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
    80% { transform: translate(-50%, -70%) scale(1); opacity: 1; }
    100% { transform: translate(-50%, -90%) scale(0.8); opacity: 0; }
  }
</style>
</head>
<body>

<div id="rewardBox" class="popup-reward">🎉 👏 ✨</div>

<div class="container" id="box">
  <span id="date"></span>
  <h2 id="title">投票アイテムを<br>集めよう！</h2>
  
  <div class="limit-info">
    <div class="limit-row"><b>IDOL CHAMP</b><span class="limit-text">💙月末まで ／ ❤️90日</span></div>
    <div class="limit-row"><b>Fancast</b><span class="limit-text">💙30日（チェックイン・広告）</span></div>
    <div class="limit-row"><b>mubeat</b><span class="limit-text">💗90日（延長クーポンあり）</span></div>
    
    <div class="limit-row">
      <b>MUNIVERSE</b><div class="mu-block"><span class="limit-text">⬜(シルバー)30日</span><br><span class="limit-text">🟦(ブルー)60日</span></div>
    </div>
    
    <div class="limit-row"><b>LiNC・tin</b><span class="limit-text">💜180日</span></div>
    <div class="limit-row"><b>Higher</b><span class="limit-text">🔴90日</span></div>
  </div>

  <div id="list">
    <div class="section-title">コツコツ応援！きょうの推しごと</div>
    <label class="item"><input type="checkbox" id="t1" class="cb cb-top"><span><small class="app-tag">IDOL CHAMP</small>出席後広告視聴❤️</span></label>
    <label class="item"><input type="checkbox" id="t2" class="cb cb-top"><span><small class="app-tag">IDOL CHAMP</small>ルーレット❤️</span></label>
    <label class="item"><input type="checkbox" id="t3" class="cb cb-top"><span><small class="app-tag">IDOL CHAMP</small>クイズ💙 <span class="note">（５日連続満点❤️）</span></span></label>
    <label class="item"><input type="checkbox" id="t4" class="cb cb-top"><span><small class="app-tag">Fancast</small>チェックイン💙</span></label>
    <label class="item"><input type="checkbox" id="t5" class="cb cb-top"><span><small class="app-tag">MUNIVERSE</small>出席⬜</span></label>
    <label class="item"><input type="checkbox" id="t6" class="cb cb-top"><span><small class="app-tag">Higher</small>出席+広告視聴ボーナス🔴</span></label>
    <label class="item"><input type="checkbox" id="t7" class="cb cb-top"><span><small class="app-tag">Higher</small>ルーレット🔴 [３回]</span></label>
    <label class="item"><input type="checkbox" id="t8" class="cb cb-top"><span><small class="app-tag">Higher</small>はしご乗り🔴 [３回]</span></label>
    
    <div class="section-title">スキマ時間に…のんびりゲット</div>
    <label class="item"><input type="checkbox" id="t9" class="cb"><span><small class="app-tag">Fancast</small>広告視聴💙 [視聴ボタン３個×２０]<span class="note">※１回ごとに１０分インターバル</span></span></label>
    <label class="item"><input type="checkbox" id="t10" class="cb"><span><small class="app-tag">Higher</small>広告視聴🔴 [５０回]<span class="note">※１０回ごとに５分インターバル</span></span></label>
    <label class="item"><input type="checkbox" id="t11" class="cb"><span><small class="app-tag">mubeat</small>広告視聴💗 [１５回]<span class="note">※１回ごとに１０秒インターバル</span></span></label>
    <label class="item"><input type="checkbox" id="t12" class="cb"><span><small class="app-tag">LiNC</small>広告視聴💜 [３０回]<span class="note">※１回ごとに１分インターバル</span></span></label>
    <label class="item"><input type="checkbox" id="t13" class="cb"><span><small class="app-tag">tin</small>広告視聴💜 [２０回]<span class="note">※１回ごとに１分インターバル</span></span></label>
    <label class="item"><input type="checkbox" id="t14" class="cb"><span><small class="app-tag">MUNIVERSE</small>広告視聴🟦 [２０回]</span></label>
    <label class="item"><input type="checkbox" id="t15" class="cb"><span><small class="app-tag">mubeat</small>クイズに挑戦💗<span class="note">※１日１回は無料</span></span></label>
  </div>

  <div class="footer">
    <b>💡 カムバックが確定するまで</b>
    <span class="indent">▶ 暮らしのなかに組み込んで日々のルーティーンに◎</span>
    <span class="indent">▶ 消えちゃうアイテムはチャートや企画に活用を…</span>
  </div>
</div>

<script>
(() => {
  const K_DATA = 'V_LIGHT_ST_V1';
  const K_DATE = 'V_LIGHT_DT_V1';
  const K_HALF = 'V_LIGHT_HF_V1'; 
  const cbs = document.querySelectorAll('.cb');
  const box = document.getElementById('box');
  const title = document.getElementById('title');
  const rewardBox = document.getElementById('rewardBox');

  const showEmojiReward = () => {
    rewardBox.classList.remove('show');
    void rewardBox.offsetWidth; 
    rewardBox.classList.add('show');
  };

  const update = (fire) => {
    let ok = 0;
    let topOk = 0;
    const topCbs = document.querySelectorAll('.cb-top');

    cbs.forEach(c => {
      const p = c.closest('.item');
      if(c.checked) { 
        ok++; 
        p.classList.add('is-completed'); 
        if(c.classList.contains('cb-top')) topOk++;
      } else { 
        p.classList.remove('is-completed'); 
      }
    });

    // 1. 【最優先】全体コンプリート判定（どの順番でも発火可能に）
    if(ok === cbs.length) {
      box.classList.add('all-completed');
      title.innerHTML = "✨ COMPLETE ✨<br>おつかれさまでした！";
    } else {
      box.classList.remove('all-completed');
      title.innerHTML = "投票アイテムを<br>集めよう！";
    }

    // 2. 前半（きょうの推しごと）コンプリート判定
    if (fire && topOk === topCbs.length && ok !== cbs.length) {
      if (localStorage.getItem(K_HALF) !== '1') {
        localStorage.setItem(K_HALF, '1');
        showEmojiReward();
      }
    }
    if (topOk < topCbs.length) {
      localStorage.removeItem(K_HALF);
    }
  };

  const save = () => {
    const d = {};
    cbs.forEach(c => d[c.id] = c.checked);
    localStorage.setItem(K_DATA, JSON.stringify(d));
    const now = new Date();
    localStorage.setItem(K_DATE, now.getFullYear()+'-'+(now.getMonth()+1)+'-'+now.getDate());
  };

  const load = () => {
    const n = new Date();
    const today = n.getFullYear()+'-'+(n.getMonth()+1)+'-'+n.getDate();
    const targetDate = document.getElementById('date');
    if(targetDate) targetDate.innerText = today.replace(/-/g, '/');

    if(localStorage.getItem(K_DATE) !== today) {
      localStorage.removeItem(K_DATA);
      localStorage.removeItem(K_HALF);
      cbs.forEach(c => c.checked = false);
    } else {
      const s = JSON.parse(localStorage.getItem(K_DATA) || '{}');
      cbs.forEach(c => c.checked = !!s[c.id]);
    }
    update(false);
  };

  cbs.forEach(c => c.addEventListener('change', () => { save(); update(true); }));
  
  const checkDateReset = () => {
    const n = new Date();
    const today = n.getFullYear()+'-'+(n.getMonth()+1)+'-'+n.getDate();
    if(localStorage.getItem(K_DATE) !== today) load();
  };

  window.addEventListener('focus', checkDateReset);
  setInterval(checkDateReset, 30000); 

  load();
})();
</script>
</body>
</html>
