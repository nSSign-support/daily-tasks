<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>投票アイテム収集リスト</title>
<!-- 修正：正しいURLを指定し、deferを付けて読み込みを高速化 -->
<script src="https://jsdelivr.net" defer></script>
<style>
  :root {
    --gold: #FFD700;
    --orange: #FF8C00;
    --red: #D32F2F;
    --app-blue: #3131FF;
    --heart-red: #FF0000;
  }
  body { margin: 0; background: #f0f2f5; font-family: sans-serif; display: flex; justify-content: center; }
  
  .container { 
    background: linear-gradient(135deg, var(--gold), var(--orange)); 
    padding: 15px; border-radius: 24px; width: 90%; max-width: 360px; margin: 15px; 
    text-align: center; box-shadow: 0 8px 20px rgba(0,0,0,0.1);
    transition: all 0.8s ease;
    /* 高速化：アニメーションの負荷を抑える準備 */
    will-change: transform, background;
  }

  .all-completed {
    background: linear-gradient(45deg, #FFD700, #FF8C00, #FF0080, #7928CA);
    background-size: 300% 300%;
    animation: shine 3s linear infinite;
    transform: scale(1.02);
    box-shadow: 0 0 30px rgba(255, 215, 0, 0.6);
  }
  @keyframes shine { 0%{background-position:0% 50%} 50%{background-position:100% 50%} 100%{background-position:0% 50%} }

  #date { font-size: 0.9rem; font-weight: bold; color: #fff; margin-bottom: 5px; display: block; text-shadow: 1px 1px 2px rgba(0,0,0,0.3); }
  
  h2 { font-size: 1.6rem; font-weight: 900; margin: 0 0 10px; color: #fff; text-shadow: 2px 2px 4px rgba(0,0,0,0.4); line-height: 1.3; }
  
  .limit-info { background: rgba(255,255,255,0.4); border-radius: 12px; padding: 10px; margin-bottom: 12px; color: #333; text-align: left; line-height: 1.4; font-weight: bold; }
  .limit-info b { color: var(--app-blue); background: #fff; padding: 1px 6px; border-radius: 4px; display: inline-block; margin-bottom: 2px; font-size: 0.8rem; }
  .limit-text { font-size: 0.65rem; white-space: nowrap; display: flex; align-items: center; flex-wrap: wrap; letter-spacing: -0.02em; } 
  
  .css-heart {
    display: inline-block;
    width: 0.7em;
    height: 0.7em;
    background-color: var(--heart-red);
    position: relative;
    transform: rotate(45deg);
    margin: 0 0.4em 0 0.3em; 
    vertical-align: baseline; 
  }
  .css-heart::before, .css-heart::after {
    content: ""; width: 0.7em; height: 0.7em; background-color: var(--heart-red); border-radius: 50%; position: absolute;
  }
  .css-heart::before { left: -0.35em; top: 0; }
  .css-heart::after { left: 0; top: -0.35em; }

  .item { 
    background: #fff; display: flex; align-items: center; padding: 12px 15px; 
    border-radius: 15px; margin-bottom: 8px; box-shadow: 0 3px 6px rgba(0,0,0,0.1);
    transition: 0.3s;
  }
  .item.is-completed { opacity: 0.4; transform: scale(0.95); background: #f8f8f8; }
  
  .item span { font-size: 1rem; color: #333; font-weight: bold; flex-grow: 1; text-align: left; line-height: 1.2; }
  .app-tag { color: var(--app-blue); font-size: 0.75rem; display: block; margin-bottom: 2px; font-weight: bold; }
  
  input[type="checkbox"] { width: 26px; height: 26px; margin-right: 12px; accent-color: var(--orange); flex-shrink: 0; }
  
  .footer { margin-top: 10px; padding: 12px; background: rgba(0,0,0,0.15); border-radius: 12px; color: #fff; text-align: left; font-size: 0.8rem; line-height: 1.6; font-weight: bold; text-shadow: 1px 1px 2px rgba(0,0,0,0.3); }
  .footer b { font-size: 0.8rem; display: block; margin-bottom: 4px; }
  .indent { font-size: 0.62rem; padding-left: 1.2em; text-indent: -1.2em; display: block; letter-spacing: -0.01em; opacity: 0.95; }
</style>
</head>
<body>

<div class="container" id="box">
  <span id="date"></span>
  <h2 id="title">投票アイテムを<br>集めよう！</h2>
  
  <div class="limit-info">
    <b>IDOL CHAMP</b>
    <span class="limit-text">💙：毎月月末まで　<span class="css-heart"></span>：獲得から90日</span>
    <b>Fancast</b>
    <span class="limit-text">💙：獲得から30日（チェックイン・広告視聴分）</span>
  </div>

  <div id="list">
    <label class="item"><input type="checkbox" id="t1" class="cb"><span><small class="app-tag">IDOL CHAMP</small>出席💙</span></label>
    <label class="item"><input type="checkbox" id="t2" class="cb"><span><small class="app-tag">IDOL CHAMP</small>出席後広告視聴<span class="css-heart"></span></span></label>
    <label class="item"><input type="checkbox" id="t3" class="cb"><span><small class="app-tag">IDOL CHAMP</small>ルーレット<span class="css-heart"></span></span></label>
    
    <label class="item"><input type="checkbox" id="t4" class="cb"><span><small class="app-tag">Fancast</small>チェックイン💙</span></label>
    <label class="item"><input type="checkbox" id="t5" class="cb"><span><small class="app-tag">Fancast</small>広告視聴💙</span></label>
  </div>

  <div class="footer">
    <b>💡 カムバックが確定するまで</b>
    <span class="indent">▶ IDOL CHAMPの💙は月末になったらチャートなどへ</span>
    <span class="indent">▶ Fancastは有効期限が短いため<br>自分のペースでルーティンに組み込んでください</span>
  </div>
</div>

<script>
(() => {
  const K_DATA = 'V_LIGHT_ST_V1';
  const K_DATE = 'V_LIGHT_DT_V1';
  const cbs = document.querySelectorAll('.cb');
  const box = document.getElementById('box');
  const title = document.getElementById('title');

  const celebrate = () => {
    // 修正：ライブラリが読み込まれているか確認してから実行
    if (typeof confetti === 'function') {
      confetti({ particleCount: 150, spread: 100, origin: { y: 0.6 }, colors: ['#FFD700', '#FF8C00', '#FF0000', '#FFFFFF'] });
      confetti({ particleCount: 40, angle: 60, spread: 55, origin: { x: 0, y: 1 } });
      confetti({ particleCount: 40, angle: 120, spread: 55, origin: { x: 1, y: 1 } });
    }
  };

  const update = (fire) => {
    let ok = 0;
    cbs.forEach(c => {
      const p = c.closest('.item');
      if(c.checked) { ok++; p.classList.add('is-completed'); }
      else { p.classList.remove('is-completed'); }
    });

    if(ok === cbs.length) {
      box.classList.add('all-completed');
      title.innerHTML = "✨ COMPLETE ✨<br>おつかれさまでした！";
      if(fire) celebrate();
    } else {
      box.classList.remove('all-completed');
      title.innerHTML = "投票アイテムを<br>集めよう！";
    }
  };

  const save = () => {
    const d = {};
    cbs.forEach(c => d[c.id] = c.checked);
    localStorage.setItem(K_DATA, JSON.stringify(d));
    const now = new Date();
    localStorage.setItem(K_DATE, now.getFullYear()+'-'+(now.getMonth()+1)+'-'+now.getDate());
  };

  const load = () => {
    const n = new Date();
    const today = n.getFullYear()+'-'+(n.getMonth()+1)+'-'+n.getDate();
    const targetDate = document.getElementById('date');
    if(targetDate) targetDate.innerText = today.replace(/-/g, '/');

    if(localStorage.getItem(K_DATE) !== today) {
      localStorage.removeItem(K_DATA);
      cbs.forEach(c => c.checked = false);
    } else {
      const s = JSON.parse(localStorage.getItem(K_DATA) || '{}');
      cbs.forEach(c => c.checked = !!s[c.id]);
    }
    update(false);
  };

  cbs.forEach(c => c.addEventListener('change', () => { save(); update(true); }));
  // 修正：focusイベントでのリロードを、日付が変わった時だけに限定（負荷軽減）
  window.addEventListener('focus', () => {
    const n = new Date();
    const today = n.getFullYear()+'-'+(n.getMonth()+1)+'-'+n.getDate();
    if(localStorage.getItem(K_DATE) !== today) load();
  });
  load();
})();
</script>
</body>
</html>
